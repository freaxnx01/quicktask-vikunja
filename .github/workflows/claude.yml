name: Claude
on:
  issues:
    types: [labeled]
  workflow_dispatch:            # lets retry-dispatch.sh re-kick a run
    inputs:
      issue-number:
        description: Issue number to implement
        type: number
        required: true

# The reusable workflow's jobs request contents/pull-requests/issues: write.
# A reusable workflow cannot be granted more than its caller, and this repo's
# default GITHUB_TOKEN is read-only, so the caller must grant these explicitly
# or the run fails at startup before any job runs.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'ai-implement')
      || github.event_name == 'workflow_dispatch'
    uses: freaxnx01/agent-pipeline/.github/workflows/claude-implement.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Used only when an issue resolves to the OpenCode agent
      # (agent:opencode label). required: false at the workflow boundary, so
      # an empty value is harmless for normal Claude runs.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # GitHub App (quicktask-pipeline-bot) for PR creation so PRs trigger the
      # required osv-scan check — the auto-merge prerequisite (agent-pipeline #70).
      PIPELINE_APP_ID: ${{ secrets.PIPELINE_APP_ID }}
      PIPELINE_APP_PRIVATE_KEY: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}
    with:
      issue-number: ${{ github.event.issue.number || inputs.issue-number }}
      runner-labels: '["ubuntu-latest"]'      # public repo → GitHub-hosted only
      default-model: claude-opus-4-7
      # ── REQUIRED for agent-pipeline consumers ──
      # The reusable workflow defaults pipeline-repo/ref to
      # freaxnx01/claude-pipeline@main (the project's original name). Override
      # both so the shared-scripts cross-repo checkout resolves to THIS pipeline.
      pipeline-repo: freaxnx01/agent-pipeline
      pipeline-ref: v1
      # Auto-review + auto-merge (ADR-002): fires only when an issue ALSO carries
      # the ai-auto-review label; PRs are opened by the quicktask-pipeline-bot App
      # (above) so they trigger required checks; allowlist matches its bot login.
      auto-review: true
      pipeline-author-allowlist: quicktask-pipeline-bot[bot]
